name: Deploy changed services

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build_backend:
        description: Manually test/build/push backend
        required: false
        default: true
        type: boolean
      build_frontend:
        description: Manually test/build/push frontend
        required: false
        default: true
        type: boolean

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      backend_changed: ${{ steps.set-changes.outputs.backend_changed }}
      frontend_changed: ${{ steps.set-changes.outputs.frontend_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths on push
        id: filter
        if: github.event_name == 'push'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'package-lock.json'
              - 'package.json'
            frontend:
              - 'frontend/**'
              - 'package-lock.json'
              - 'package.json'

      - name: Set service change outputs
        id: set-changes
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSH_BACKEND_CHANGED: ${{ steps.filter.outputs.backend }}
          PUSH_FRONTEND_CHANGED: ${{ steps.filter.outputs.frontend }}
          MANUAL_BACKEND: ${{ github.event.inputs.build_backend }}
          MANUAL_FRONTEND: ${{ github.event.inputs.build_frontend }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            backend_changed="${MANUAL_BACKEND:-true}"
            frontend_changed="${MANUAL_FRONTEND:-true}"
          else
            backend_changed="${PUSH_BACKEND_CHANGED:-false}"
            frontend_changed="${PUSH_FRONTEND_CHANGED:-false}"
          fi

          echo "backend_changed=$backend_changed" >> "$GITHUB_OUTPUT"
          echo "frontend_changed=$frontend_changed" >> "$GITHUB_OUTPUT"

  deploy-backend:
    name: Deploy backend
    needs: detect-changes
    if: needs.detect-changes.outputs.backend_changed == 'true'
    uses: ./.github/workflows/deploy-service.yml
    permissions:
      id-token: write
      contents: read
    with:
      service_name: backend
      working_directory: backend
      test_command: npm test -- --passWithNoTests
      docker_context: ./backend
      dockerfile: ./backend/Dockerfile
      aws_region: ${{ vars.AWS_REGION }}
      ecr_repository: ${{ vars.ECR_BACKEND_REPOSITORY }}
      build_args: ''
    secrets:
      aws_role_to_assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

  deploy-frontend:
    name: Deploy frontend
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      S3_BUCKET: ${{ vars.FRONTEND_S3_BUCKET }}
      CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.FRONTEND_CLOUDFRONT_DISTRIBUTION_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required workflow configuration
        env:
          AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        run: |
          required_vars=("AWS_REGION" "S3_BUCKET" "CLOUDFRONT_DISTRIBUTION_ID")
          for var in "${required_vars[@]}"; do
            if [ -z "${!var}" ]; then
              echo "::error::Missing workflow variable: $var"
              exit 1
            fi
          done

          if [ -z "$AWS_ROLE_TO_ASSUME" ]; then
            echo "::error::Missing workflow secret: AWS_ROLE_TO_ASSUME"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run unit tests
        working-directory: frontend
        run: npm run test:unit -- --run --passWithNoTests

      - name: Build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ vars.FRONTEND_VITE_API_BASE_URL }}
          VITE_APP_URL: ${{ vars.FRONTEND_VITE_APP_URL }}
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        working-directory: frontend
        run: |
          set -euo pipefail

          # Pass 1: full sync, prune stale files, default = immutable (correct for
          # content-hashed assets/* and workbox-<hash>.js). Files needing other
          # headers are excluded so they aren't cached immutably or pruned here.
          aws s3 sync dist "s3://$S3_BUCKET" --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html" \
            --exclude "sw.js" \
            --exclude "manifest.webmanifest" \
            --exclude "robots.txt" \
            --exclude "sitemap.xml"

          # Pass 2: must-revalidate app shell + service worker
          aws s3 sync dist "s3://$S3_BUCKET" \
            --cache-control "no-cache" \
            --exclude "*" \
            --include "index.html" \
            --include "sw.js" \
            --include "manifest.webmanifest"

          # Pass 3: SEO files — short cache so edits propagate
          aws s3 sync dist "s3://$S3_BUCKET" \
            --cache-control "public,max-age=3600" \
            --exclude "*" \
            --include "robots.txt" \
            --include "sitemap.xml"

          # Pass 4: fix content-type for the manifest (sync can mis-detect .webmanifest)
          aws s3 cp "s3://$S3_BUCKET/manifest.webmanifest" "s3://$S3_BUCKET/manifest.webmanifest" \
            --metadata-directive REPLACE \
            --content-type "application/manifest+json" \
            --cache-control "no-cache"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
            --paths "/" "/index.html" "/sw.js" "/manifest.webmanifest" "/robots.txt" "/sitemap.xml"

  deploy-gate:
    name: Deploy gate
    runs-on: ubuntu-latest
    if: always()
    needs:
      - detect-changes
      - deploy-backend
      - deploy-frontend
    steps:
      - name: Validate deploy outcomes
        env:
          BACKEND_CHANGED: ${{ needs.detect-changes.outputs.backend_changed }}
          FRONTEND_CHANGED: ${{ needs.detect-changes.outputs.frontend_changed }}
          BACKEND_RESULT: ${{ needs.deploy-backend.result }}
          FRONTEND_RESULT: ${{ needs.deploy-frontend.result }}
        run: |
          if [ "$BACKEND_CHANGED" = "true" ] && [ "$BACKEND_RESULT" != "success" ]; then
            echo "::error::Backend changed, but deploy-backend did not succeed (result: $BACKEND_RESULT)."
            exit 1
          fi

          if [ "$FRONTEND_CHANGED" = "true" ] && [ "$FRONTEND_RESULT" != "success" ]; then
            echo "::error::Frontend changed, but deploy-frontend did not succeed (result: $FRONTEND_RESULT)."
            exit 1
          fi

          echo "Deploy gate passed."
