name: Reusable deploy service

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      working_directory:
        required: true
        type: string
      test_command:
        required: true
        type: string
      docker_context:
        required: true
        type: string
      dockerfile:
        required: true
        type: string
      aws_region:
        required: true
        type: string
      ecr_repository:
        required: true
        type: string
      build_args:
        required: false
        default: ''
        type: string
    secrets:
      aws_role_to_assume:
        required: true

jobs:
  test-build-push:
    name: Test, build, and push ${{ inputs.service_name }}
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ inputs.aws_region }}
      ECR_REPOSITORY: ${{ inputs.ecr_repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required workflow configuration
        env:
          AWS_ROLE_TO_ASSUME: ${{ secrets.aws_role_to_assume }}
        run: |
          required_vars=("AWS_REGION" "ECR_REPOSITORY")
          for var in "${required_vars[@]}"; do
            if [ -z "${!var}" ]; then
              echo "::error::Missing workflow input: $var"
              exit 1
            fi
          done

          if [ -z "$AWS_ROLE_TO_ASSUME" ]; then
            echo "::error::Missing workflow secret: aws_role_to_assume"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ inputs.working_directory }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ inputs.working_directory }}
        run: npm ci

      - name: Cache mongodb-memory-server binary
        if: inputs.service_name == 'backend'
        uses: actions/cache@v4
        with:
          path: ~/.cache/mongodb-binaries
          key: ${{ runner.os }}-mongodb-memory-server-${{ hashFiles(format('{0}/package-lock.json', inputs.working_directory)) }}
          restore-keys: |
            ${{ runner.os }}-mongodb-memory-server-

      - name: Run tests
        working-directory: ${{ inputs.working_directory }}
        run: ${{ inputs.test_command }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.aws_role_to_assume }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image (no build args)
        if: inputs.build_args == ''
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.docker_context }}
          file: ${{ inputs.dockerfile }}
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}

      - name: Build and push image (with build args)
        if: inputs.build_args != ''
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.docker_context }}
          file: ${{ inputs.dockerfile }}
          push: true
          build-args: ${{ inputs.build_args }}
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
